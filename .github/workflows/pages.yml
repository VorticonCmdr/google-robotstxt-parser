name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Build site
      run: |
        mkdir -p _site
        cp docs/index.html _site/index.html
        cp robots.js _site/robots.js
        cp docs/vorticoncmdr.github.io_google-robotstxt-parser_.png _site/preview.png

    - uses: actions/configure-pages@v4

    - uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - id: deploy
      uses: actions/deploy-pages@v4
